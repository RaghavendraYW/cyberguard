services:
  - type: web
    name: cyberguard
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cyberguard-db
          property: connectionString
      - key: APP_NAME
        value: CyberGuard
      - key: APP_VERSION
        value: 2.0.0
      - key: DEBUG
        value: false
      - key: JWT_EXPIRE_HOURS
        value: 12
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: cyberguard-db
    databaseName: cyberguard
    plan: free
